<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API REQUEST</title>
  </head>
  <body style="background-color: black; color: whitesmoke">
    Value State Description 0 UNSENT Client has been created. open() not called
    yet.
    <br />
    1 OPENED open() has been called. <br />

    2 HEADERS_RECEIVED send() has been called, and headers and status are
    available.<br />

    3 LOADING Downloading; responseText holds partial data. <br />

    4 DONE The operation is complete.<br />
  </body>
  <script>
    const requestURL = "https://api.github.com/users/Catherine-23-Codes";
    const xhr = new XMLHttpRequest();
    xhr.open("GET", requestURL);
    xhr.onreadystatechange = function () {
      console.log(xhr.readyState);
      if (xhr.readyState == 4) {
        const data = JSON.parse(this.responseText); //convert string to obj
        console.log(typeof data); //most of the times response from URL is not "STRINGS"
        console.log(data.followers);
      }
    };
    xhr.send();
  </script>
</html>
